<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="login.js"></script>
</head>

<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre Nós</a></li>
            <li><a href="#">Cadastre-se</a></li>
            <li><a href="#">Área do Corretor</a></li>
            <li><a href="#">Contato</a></li>
            <li>
                <a>Serviços</a>
                <ul class="submenu">
                    <li><a href="#">Plano Familiar</a></li>
                    <li><a href="#">Plano Empresarial</a></li>
                    <li><a href="#">Principais Produtos</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <div class="login-container">
        <h2>Login</h2>
        <form>
            <div class="input-group">
                <label for="txtEmail">Email</label>
                <input type="text" id ="txtUsuario" name = "txtUsuario" placeholder="Digite seu usuário" required>
            </div>
            <div class="input-group">
                <label for="txtCpf">CPF</label>
                <input type="text" id ="txtCpf" name = "txtCpf" placeholder="Digite seu CPF" required>
            </div>
            <div class="input-group">
                <label for="txtSenha">Senha</label>
                <input type="password" id ="txtSenha" name = "txtSenha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" onclick="validarLogin()">Entrar</button>
        </form>
    </div>
</body>
</html>
